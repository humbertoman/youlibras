<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Contextos - Vídeos</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; padding: 20px; background-color: #f4f6f9; display: flex; flex-direction: column; height: 100vh; }
        
        .header { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 200px; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        #filtro-direcao { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; background: white; }
        .search-btn { padding: 12px 24px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; width: auto; }
        .search-btn:hover { background-color: #218838; }

        /* Blocos de Publicidade */
        .pub-superior { width: 100%; margin-bottom: 20px; }
        .pub-lateral { width: 100%; margin-top: 15px; }
        .pub-box { background: #e9ecef; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #6c757d; font-size: 14px; font-weight: bold; }

        .container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        
        /* Coluna da Esquerda: Resultados */
        .resultados-col { flex: 1; overflow-y: auto; background: white; padding: 15px; border-radius: 6px; border: 1px solid #e1e4e8; }
        .trecho-card { padding: 12px; margin-bottom: 12px; border-left: 4px solid #28a745; background-color: #f8f9fa; cursor: pointer; transition: background 0.2s; }
        .trecho-card:hover { background-color: #e9ecef; }
        .trecho-tempo { font-size: 12px; color: #6c757d; font-weight: bold; margin-top: 5px; }
        mark { background-color: #ffeb3b; font-weight: bold; }

        /* Coluna da Direita: Player Fixo */
        .player-col { width: 450px; display: flex; flex-direction: column; gap: 15px; position: sticky; top: 0; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 6px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        #player-status { font-size: 14px; color: #495057; text-align: center; margin: 0; }

        /* Ajustes para Celular (Telas de até 768px) */
        @media (max-width: 768px) {
            body { padding: 10px; height: auto; display: block; }
            .header { gap: 8px; }
            .search-input { width: 100%; flex: none; }
            #filtro-direcao { flex: 1; }
            .search-btn { flex: 1; }
            
            /* Oculta anúncio superior no celular para salvar espaço de tela */
            .pub-superior { display: none; } 
            
            .container { flex-direction: column-reverse; display: flex; gap: 15px; }
            
            .player-col { 
                width: 100%; 
                position: sticky; 
                top: 0; 
                background: #f4f6f9; 
                padding: 10px 0; 
                z-index: 1000; 
                box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            }
            
            #player-status { font-size: 12px; }
            .resultados-col { overflow-y: visible; border: 1px solid #e1e4e8; }
        }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="busca" class="search-input" placeholder="Digite uma palavra ou frase para buscar no contexto...">
        <select id="filtro-direcao">
            <option value="todos">Todas as Direções</option>
            <option value="pt-libras">Português ➔ Libras</option>
            <option value="libras-pt">Libras ➔ Português</option>
        </select>
        <button id="btn-buscar" class="search-btn">Pesquisar</button>
    </div>

    <div class="pub-superior">
        <span style="color: #999; font-size: 10px; display: block; text-align: center; margin-bottom: 2px;">PUBLICIDADE</span>
        <div class="pub-box" style="width: 100%; height: 90px;">
            Espaço reservado para anúncio (Banner Leaderboard 728x90)
        </div>
    </div>

    <div class="container">
        <div id="resultados" class="resultados-col">
            <p style="color: gray;">Digite um termo acima para iniciar a busca nos contextos.</p>
        </div>
        
        <div class="player-col">
            <div class="player-wrapper">
                <div id="player"></div>
            </div>
            <p id="player-status">Nenhum vídeo selecionado</p>

            <div class="pub-lateral">
                <span style="color: #999; font-size: 10px; display: block; text-align: center; margin-bottom: 2px;">PUBLICIDADE</span>
                <div class="pub-box" style="width: 100%; height: 250px;">
                    Espaço reservado para anúncio (Retângulo Médio 300x250)
                </div>
            </div>
        </div>
    </div>

    <script>
        // Banco de dados reserva apenas para testes locais no VS Code (evitar erro de CORS)
        let bancoDados = [
            { "video_id": "U80ArHqzkJs", "texto": "exemplo de contação de histórias em libras com o gato viriato mente isolada", "tempo_inicio": 26, "direcao": "libras-pt" },
            { "video_id": "U80ArHqzkJs", "texto": "este é um teste local que funciona puramente para verificar os botões", "tempo_inicio": 57, "direcao": "pt-libras" }
        ];
        let player;

        // 1. API do Player do YouTube
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '', 
                playerVars: { 'autoplay': 1, 'playsinline': 1 }
            });
        }

        // 2. Carrega o arquivo JSON real da pasta
        fetch('legendas_completo.json')
            .then(response => {
                if (!response.ok) throw new Error("Erro ao ler arquivo externo");
                return response.json();
            })
            .then(data => {
                bancoDados = data;
                console.log("Banco de dados carregado com sucesso: " + bancoDados.length + " trechos.");
            })
            .catch(err => {
                console.warn("Aviso: Usando banco de dados local temporário devido às travas CORS do navegador.");
                document.getElementById('resultados').innerHTML = "<p style='color:orange;'>Nota: Rodando em modo de teste local. No GitHub Pages os dados completos funcionarão.</p>";
            });

        // 3. Função de busca estruturada
        function executarBusca() {
            let termoOriginal = document.getElementById('busca').value.trim();
            const filtroDirecao = document.getElementById('filtro-direcao').value; 
            const containerResultados = document.getElementById('resultados');
            containerResultados.innerHTML = "";

            if (!termoOriginal) {
                containerResultados.innerHTML = "<p>Por favor, digite um termo.</p>";
                return;
            }

            let resultadosFiltrados = [];
            let ultimoVideoId = null;
            let ultimoTempo = -999;
            
            const ehBuscaExata = termoOriginal.startsWith('"') && termoOriginal.endsWith('"');
            let termoParaBusca = termoOriginal.toLowerCase();
            let regexBusca = null;

            if (ehBuscaExata) {
                termoParaBusca = termoOriginal.slice(1, -1).toLowerCase();
                const termoEscapado = termoParaBusca.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                regexBusca = new RegExp(`\\b${termoEscapado}\\b`, 'i');
            }

            bancoDados.forEach(item => {
                if (filtroDirecao !== "todos" && item.direcao && item.direcao !== filtroDirecao) {
                    return; 
                }
                if (filtroDirecao === "pt-libras" && !item.direcao) {
                    // Mantém os dados antigos associados a pt-libras
                } else if (filtroDirecao === "libras-pt" && !item.direcao) {
                    return; 
                }

                let encontrou = false;
                if (ehBuscaExata) {
                    encontrou = regexBusca.test(item.texto);
                } else {
                    encontrou = item.texto.toLowerCase().includes(termoParaBusca);
                }

                if (encontrou) {
                    // CORREÇÃO AQUI: Validando corretamente o ID e o tempo do último vídeo inserido
                    if (item.video_id === ultimoVideoId && (item.tempo_inicio - ultimoTempo) < 5) {
                        return;
                    }
                    resultadosFiltrados.push(item);
                    ultimoVideoId = item.video_id;
                    ultimoTempo = item.tempo_inicio;
                }
            });

            if (resultadosFiltrados.length === 0) {
                containerResultados.innerHTML = `<p style="color: red;">Nenhum resultado encontrado para <b>${termoOriginal}</b>.</p>`;
                return;
            }

            const marcadorResultados = document.createElement('p');
            marcadorResultados.style.color = "green";
            marcadorResultados.style.marginTop = "0px";
            marcadorResultados.innerHTML = `<b>${resultadosFiltrados.length}</b> trechos encontrados:`;
            containerResultados.appendChild(marcadorResultados);

            resultadosFiltrados.forEach(res => {
                const minutes = Math.floor(res.tempo_inicio / 60);
                const seconds = Math.floor(res.tempo_inicio % 60);
                const tempoFormatado = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                const regexDestaque = new RegExp(`(${termoParaBusca.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi');
                const textoDestacado = res.texto.replace(regexDestaque, "<mark>$1</mark>");

                const card = document.createElement('div');
                card.className = 'trecho-card';
                card.innerHTML = `
                    <p style="margin: 0 0 5px 0;">... ${textoDestacado} ...</p>
                    <div class="trecho-tempo">⏱️ Posição: ${tempoFormatado}</div>
                `;

                card.onclick = () => {
                    const folgaTempo = Math.max(0, Math.floor(res.tempo_inicio) - 2);
                    if (player && player.loadVideoById) {
                        player.loadVideoById({
                            videoId: res.video_id,
                            startSeconds: folgaTempo
                        });
                        document.getElementById('player-status').innerText = `Tocando vídeo ID: ${res.video_id} no tempo ${tempoFormatado}`;
                    }
                };

                containerResultados.appendChild(card);
            });
        }

        // Eventos de gatilho de busca
        document.getElementById('btn-buscar').onclick = executarBusca;
        document.getElementById('busca').onkeypress = function(e) {
            if (e.key === 'Enter') {
                executarBusca();
            }
        };
    </script>
</body>
</html>
